<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060d18"/>
      <stop offset="0.5" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)" opacity="0.35"/>
  <!-- Glow -->
  <ellipse cx="200" cy="160" rx="180" ry="120" fill="#06b6d4" opacity="0.06"/>
  <ellipse cx="1100" cy="80" rx="200" ry="100" fill="#8b5cf6" opacity="0.04"/>
  <!-- Logo -->
  <g transform="translate(80,80) scale(1.3)">
    <path d="M60 8 L104 32 V72 L60 112 L16 72 V32 Z" stroke="url(#accent)" stroke-width="2.5" fill="#111827"/>
    <path d="M28 44 C44 36, 76 36, 92 44" stroke="#06b6d4" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M24 60 C42 68, 78 52, 96 60" stroke="#22d3ee" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M28 76 C48 68, 72 84, 92 76" stroke="#67e8f9" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="60" cy="52" r="4" fill="#06b6d4"/>
    <circle cx="60" cy="68" r="3.5" fill="#67e8f9" opacity="0.8"/>
  </g>
  <!-- Title -->
  <text x="260" y="145" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="#f8fafc" letter-spacing="-2">SOCloom</text>
  <text x="262" y="195" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#94a3b8">SOC operations woven with 800+ security skills</text>
  <!-- Badges row -->
  <g transform="translate(262, 225)">
    <rect x="0" y="0" width="110" height="28" rx="6" fill="#111827" stroke="#1e293b"/>
    <text x="55" y="19" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#06b6d4" font-weight="600">817 SKILLS</text>
    <rect x="120" y="0" width="100" height="28" rx="6" fill="#111827" stroke="#1e293b"/>
    <text x="170" y="19" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#22d3ee" font-weight="600">MITRE ATT&amp;CK</text>
    <rect x="230" y="0" width="70" height="28" rx="6" fill="#111827" stroke="#1e293b"/>
    <text x="265" y="19" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a78bfa" font-weight="600">MCP</text>
    <rect x="310" y="0" width="50" height="28" rx="6" fill="#111827" stroke="#1e293b"/>
    <text x="335" y="19" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#10b981" font-weight="600">ML</text>
  </g>
  <!-- Decorative lines right -->
  <g opacity="0.5" transform="translate(900, 60)">
    <line x1="0" y1="0" x2="300" y2="0" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="40" y1="40" x2="340" y2="40" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
    <line x1="80" y1="80" x2="380" y2="80" stroke="#67e8f9" stroke-width="1" opacity="0.2"/>
    <line x1="120" y1="120" x2="420" y2="120" stroke="#06b6d4" stroke-width="1" opacity="0.15"/>
    <line x1="160" y1="160" x2="460" y2="160" stroke="#22d3ee" stroke-width="1" opacity="0.1"/>
  </g>
</svg>