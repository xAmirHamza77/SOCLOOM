  <polyline points="430,310 470,295 510,300 550,280 590,285 630,265 670,270 710,250 750,255" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="750" cy="255" r="4" fill="#06b6d4"/>
  <text x="760" y="259" font-family="JetBrains Mono, monospace" font-size="11" fill="#06b6d4">67%</text>
