  <g font-family="Inter, system-ui, sans-serif" font-size="11">
    <rect x="60" y="290" width="10" height="10" rx="2" fill="#ef4444"/><text x="76" y="299" fill="#94a3b8">Critical 12%</text>
    <rect x="160" y="290" width="10" height="10" rx="2" fill="#f97316"/><text x="176" y="299" fill="#94a3b8">High 29%</text>
    <rect x="250" y="290" width="10" height="10" rx="2" fill="#f59e0b"/><text x="266" y="299" fill="#94a3b8">Medium 35%</text>
    <rect x="350" y="290" width="10" height="10" rx="2" fill="#10b981"/><text x="366" y="299" fill="#94a3b8">Low 24%</text>
  </g>
  <!-- Bar chart right -->
  <text x="430" y="110" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Top Attack Types</text>
  <rect x="430" y="130" width="180" height="16" rx="3" fill="#06b6d4" opacity="0.7"/>
  <text x="430" y="142" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#0b1220" font-weight="600">UDP Flood</text>
  <text x="620" y="142" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">8</text>
