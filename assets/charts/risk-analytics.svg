  <text x="430" y="170" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#0b1220" font-weight="600">Port Scan</text>
  <text x="620" y="170" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">5</text>
  <rect x="430" y="186" width="95" height="16" rx="3" fill="#8b5cf6" opacity="0.6"/>
  <text x="430" y="198" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#f1f5f9" font-weight="600">Lateral Mvmt</text>
  <text x="620" y="198" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">4</text>
