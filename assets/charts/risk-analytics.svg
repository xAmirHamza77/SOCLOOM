  <text x="430" y="226" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#f1f5f9" font-weight="600">Data Exfil</text>
  <text x="620" y="226" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">3</text>
