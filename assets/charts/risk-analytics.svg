  <circle cx="200" cy="200" r="80" fill="none" stroke="#ef4444" stroke-width="24" stroke-dasharray="100 402" stroke-dashoffset="0" transform="rotate(-90 200 200)"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="#f97316" stroke-width="24" stroke-dasharray="150 352" stroke-dashoffset="-100" transform="rotate(-90 200 200)"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="#f59e0b" stroke-width="24" stroke-dasharray="180 322" stroke-dashoffset="-250" transform="rotate(-90 200 200)"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="#10b981" stroke-width="24" stroke-dasharray="72 430" stroke-dashoffset="-430" transform="rotate(-90 200 200)"/>
  <text x="200" y="195" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#f1f5f9">42</text>
  <text x="200" y="215" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">ALERTS</text>
