services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AEGIS_SKILLS_PATH=/skills
      - AEGIS_DATABASE_URL=sqlite:////data/aegis.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - AEGIS_LLM_PROVIDER=${AEGIS_LLM_PROVIDER:-openai}
    volumes:
      - ./data:/data
      - ${AEGIS_SKILLS_PATH:-../Downloads/Anthropic-Cybersecurity-Skills-main}:/skills:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api